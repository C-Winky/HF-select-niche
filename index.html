<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Interest Category Prompt</title>
  <style>
    :root {
      --black: #000;
      --white: #fff;
      --lime: #ccff00;
      --muted: rgba(255, 255, 255, .68);
      --line: rgba(255, 255, 255, .16);
      --panel: rgba(12, 12, 12, .94);
      --chip: rgba(255, 255, 255, .08);
      --chip-border: rgba(255, 255, 255, .18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--black);
      color: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .stage {
      width: min(100%, 430px);
      min-height: min(932px, calc(100vh - 40px));
      aspect-ratio: 430 / 932;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, .2), rgba(0, 0, 0, .84) 72%),
        radial-gradient(circle at 78% 18%, rgba(204, 255, 0, .16), transparent 30%),
        #050505;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .54);
    }

    .video-feed {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      font-weight: 760;
      letter-spacing: 0;
      color: rgba(255, 255, 255, .9);
      text-shadow: 0 1px 10px rgba(0, 0, 0, .6);
    }

    .icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bar {
      width: 17px;
      height: 11px;
      border: 2px solid var(--white);
      border-top-width: 5px;
      border-radius: 3px;
      opacity: .9;
    }

    .mock-video {
      align-self: end;
      display: grid;
      gap: 14px;
      padding-bottom: 72px;
    }

    .creator {
      width: 58%;
      height: 12px;
      border-radius: 99px;
      background: rgba(255, 255, 255, .3);
    }

    .caption {
      width: 82%;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(90deg, rgba(255, 255, 255, .18), rgba(255, 255, 255, .07));
    }

    .side-actions {
      position: absolute;
      right: 14px;
      bottom: 162px;
      display: grid;
      gap: 18px;
    }

    .action {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .18);
      background: rgba(255, 255, 255, .09);
      display: grid;
      place-items: center;
      font-size: 19px;
      font-weight: 900;
    }

    .scenario-switch {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 62px;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0, 0, 0, .48);
      backdrop-filter: blur(18px);
    }

    .scenario-switch button {
      min-height: 34px;
      border-radius: 999px;
      background: transparent;
      color: rgba(255, 255, 255, .72);
      font-size: 12px;
      font-weight: 800;
    }

    .scenario-switch button.active {
      background: var(--lime);
      color: var(--black);
    }

    .modal-shell {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 4;
      padding: 12px 14px calc(16px + env(safe-area-inset-bottom));
    }

    .sheet {
      border: 1px solid var(--line);
      border-radius: 28px 28px 24px 24px;
      background: var(--panel);
      box-shadow: 0 -18px 56px rgba(0, 0, 0, .62);
      overflow: hidden;
    }

    .grabber {
      width: 42px;
      height: 4px;
      margin: 10px auto 4px;
      border-radius: 99px;
      background: rgba(255, 255, 255, .24);
    }

    .content {
      padding: 16px 16px 14px;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .hint-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      padding: 0 11px;
      border: 1px solid rgba(204, 255, 0, .58);
      border-radius: 999px;
      color: var(--lime);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .spark {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 18px rgba(204, 255, 0, .9);
    }

    .skip-link {
      background: transparent;
      color: rgba(255, 255, 255, .64);
      font-size: 13px;
      font-weight: 780;
    }

    h1 {
      max-width: 330px;
      margin: 0;
      font-size: 32px;
      line-height: 1.02;
      letter-spacing: 0;
      font-weight: 920;
    }

    .copy {
      max-width: 340px;
      margin: 10px 0 18px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.36;
      font-weight: 650;
    }

    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      max-height: 312px;
      overflow: hidden;
      padding-bottom: 2px;
    }

    .chip {
      min-height: 42px;
      padding: 0 15px;
      border: 1px solid var(--chip-border);
      border-radius: 999px;
      background: var(--chip);
      color: rgba(255, 255, 255, .82);
      font-size: 14px;
      font-weight: 820;
      white-space: nowrap;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .03);
    }

    .chip.selected {
      border-color: var(--lime);
      background: var(--lime);
      color: var(--black);
      box-shadow: 0 0 24px rgba(204, 255, 0, .18);
    }

    .footer {
      display: block;
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(255, 255, 255, .08);
      background: rgba(0, 0, 0, .3);
    }

    .btn {
      width: 100%;
      min-height: 52px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 920;
    }

    .btn.primary {
      background: var(--lime);
      color: var(--black);
      box-shadow: 0 0 28px rgba(204, 255, 0, .18);
    }

    .scene-video .chip-grid {
      max-height: 312px;
    }

    .scene-login .modal-shell {
      top: 118px;
      bottom: auto;
      padding-top: 0;
    }

    .scene-login .sheet {
      border-radius: 30px;
      box-shadow: 0 20px 70px rgba(0, 0, 0, .68);
    }

    .scene-login .grabber {
      display: none;
    }

    .scene-login .content {
      padding-top: 22px;
    }

    @media (max-width: 380px) {
      body {
        padding: 0;
      }

      .stage {
        width: 100vw;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }

      h1 {
        font-size: 29px;
      }

      .chip {
        min-height: 39px;
        padding: 0 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="stage scene-login" id="stage">
    <section class="video-feed" aria-hidden="true">
      <div class="status">
        <span>14:36</span>
        <span class="icons"><span>5G</span><span class="bar"></span><span>62</span></span>
      </div>
      <div class="mock-video">
        <div class="creator"></div>
        <div class="caption"></div>
      </div>
      <div class="side-actions">
        <div class="action">+</div>
        <div class="action">♡</div>
        <div class="action">↗</div>
      </div>
    </section>

    <nav class="scenario-switch" aria-label="Preview scenarios">
      <button class="active" type="button" data-scene="login">After login</button>
      <button type="button" data-scene="video">4th video</button>
    </nav>

    <section class="modal-shell" aria-label="Choose interests">
      <div class="sheet">
        <div class="grabber"></div>
        <div class="content">
          <div class="topline">
            <div class="hint-pill"><span class="spark"></span><span id="count">0/3 picked</span></div>
            <button class="skip-link" type="button">Skip</button>
          </div>
          <h1 id="headline">Personalize your feed.</h1>
          <p class="copy" id="subcopy">Choose up to 3 interests to discover trending opportunities.</p>
          <div class="chip-grid" aria-label="Interest categories">
            <button class="chip" type="button">Beauty</button>
            <button class="chip" type="button">Fashion</button>
            <button class="chip" type="button">Health</button>
            <button class="chip" type="button">Sports</button>
            <button class="chip" type="button">Electronics</button>
            <button class="chip" type="button">Home</button>
            <button class="chip" type="button">Food</button>
            <button class="chip" type="button">Auto</button>
            <button class="chip" type="button">Menswear</button>
            <button class="chip" type="button">Collectibles</button>
            <button class="chip" type="button">Toys</button>
            <button class="chip" type="button">Kitchenware</button>
            <button class="chip" type="button">DIY</button>
          </div>
        </div>
        <div class="footer">
          <button class="btn primary" type="button">Confirm</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const stage = document.querySelector("#stage");
    const sceneButtons = document.querySelectorAll("[data-scene]");
    const headline = document.querySelector("#headline");
    const subcopy = document.querySelector("#subcopy");
    const count = document.querySelector("#count");
    const chips = document.querySelectorAll(".chip");

    const sceneText = {
      login: {
        headline: "Personalize your feed.",
        subcopy: "Choose up to 3 interests to discover trending opportunities."
      },
      video: {
        headline: "Not your vibe?",
        subcopy: "Pick up to 3 niches to discover trending creators, viral products, and winning videos."
      }
    };

    function updateCount() {
      count.textContent = `${document.querySelectorAll(".chip.selected").length}/3 picked`;
    }

    chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        const selected = document.querySelectorAll(".chip.selected").length;
        if (!chip.classList.contains("selected") && selected >= 3) return;
        chip.classList.toggle("selected");
        updateCount();
      });
    });

    sceneButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const scene = button.dataset.scene;
        sceneButtons.forEach((item) => item.classList.toggle("active", item === button));
        stage.classList.toggle("scene-login", scene === "login");
        stage.classList.toggle("scene-video", scene === "video");
        headline.textContent = sceneText[scene].headline;
        subcopy.textContent = sceneText[scene].subcopy;
      });
    });

    updateCount();
  </script>
</body>
</html>
